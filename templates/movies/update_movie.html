<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактирование фильма</title>
</head>
<body>
    <h1>Редактировать информацию о фильме</h1>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Сохранить изменения</button>
    </form>

    <p><a href="/movie_detail/{{ movie.id }}/">Отмена</a></p>
</body>
</html>
