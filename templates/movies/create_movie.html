<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавление фильма</title>
</head>
<body>
    <h1>Добавить новый фильм в CineBoard</h1>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Создать фильм</button>
    </form>

    <p><a href="/movie_list/">Отмена</a></p>
</body>
</html>
