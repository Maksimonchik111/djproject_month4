 <h1>Товары в категории: {{ category.name }}</h1>
 {% if products %}
        <ul>
            {% for product in products %}
                <li>{{ product.name }} — {{ product.price }}сом</li>
            {% endfor %}
        </ul>
    {% else %}
        <p>В этой категории пока нет товаров.</p>
    {% endif %}
 <a href="{% url 'category_list' %}">Назад к списку категорий</a>
